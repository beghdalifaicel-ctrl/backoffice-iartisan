name: Cron - agent_tasks worker

# Vercel Hobby ne permet pas de cron < 1x/jour.
# On deporte la planif sur GitHub Actions (gratuit) qui ping l'endpoint Vercel
# protege par CRON_SECRET. Identique fonctionnellement a un cron Vercel.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/agent-tasks
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret manquant dans le repo GitHub"
            exit 1
          fi
          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "https://app.iartisan.io/api/cron/agent-tasks")
          status=$(echo "$response" | tail -n 1)
          echo "HTTP $status"
          echo "$response" | head -n -1
          if [ "$status" != "200" ]; then
            echo "::error::Worker a renvoye HTTP $status"
            exit 1
          fi
